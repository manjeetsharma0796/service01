# Render blueprint for the MPP echo mock.
# Click "New > Blueprint" in the Render dashboard, point at this repo, and deploy.
services:
  - type: web
    name: klink-mpp-echo-mock
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      # REQUIRED: base58 Solana pubkey that receives payments.
      # Set this in the Render dashboard before first deploy.
      - key: SOLANA_RECIPIENT
        sync: false

      # Render generates a stable 32-byte secret so challenge URLs survive restarts.
      - key: MPP_SECRET_KEY
        generateValue: true

      # Solana network: devnet | mainnet-beta | localnet
      - key: ADVERTISE
        value: devnet

      # Asset to charge in: sol | usdc
      - key: ASSET
        value: usdc
